name: SRMS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'srms/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'srms/**'

env:
  NODE_VERSION: '20'
  WORKING_DIR: srms

defaults:
  run:
    working-directory: srms

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Lint + Type Check (fast feedback)
  # ─────────────────────────────────────────────
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx next lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Stage 2: Build (catches compile errors)
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 15

    env:
      # Dummy env vars for build (not connecting to real DB)
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npx next build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: srms/.next
          retention-days: 1

  # ─────────────────────────────────────────────
  # Stage 3: E2E Tests (Playwright)
  # ─────────────────────────────────────────────
  e2e-tests:
    name: 🧪 E2E Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    services:
      # Supabase local setup via Docker for isolated testing
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: srms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/srms_test
      TEST_WAITER_EMAIL: waiter@demo.com
      TEST_WAITER_PASSWORD: password123
      TEST_KITCHEN_EMAIL: kitchen@demo.com
      TEST_KITCHEN_PASSWORD: password123

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: srms/.next

      - name: Run database migrations
        if: env.DATABASE_URL != ''
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Applying: $f"
            PGPASSWORD=postgres psql -h localhost -U postgres -d srms_test -f "$f" || true
          done

      - name: Seed test data
        if: env.DATABASE_URL != ''
        run: |
          node scripts/seed.js || echo "Seed script skipped (may need Supabase)"

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=github
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: srms/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: srms/test-results/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 4: Deploy Preview (PRs)
  # ─────────────────────────────────────────────
  deploy-preview:
    name: 🚀 Deploy Preview
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Preview)
        if: env.VERCEL_TOKEN != ''
        run: |
          vercel deploy --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --confirm \
            2>&1 | tee deploy-output.txt

          PREVIEW_URL=$(grep -oP 'https://[^ ]+\.vercel\.app' deploy-output.txt | head -1)
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Comment preview URL on PR
        if: env.PREVIEW_URL != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed**: ${process.env.PREVIEW_URL}\n\n✅ Build passed | 🧪 Tests completed`
            })

  # ─────────────────────────────────────────────
  # Stage 5: Deploy Production (main branch)
  # ─────────────────────────────────────────────
  deploy-production:
    name: 🌍 Deploy Production
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        if: env.VERCEL_TOKEN != ''
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --confirm
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Production deploy summary
        run: |
          echo "✅ Production deployment triggered"
          echo "📊 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
