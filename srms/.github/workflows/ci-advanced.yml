name: SRMS CI/CD Pipeline — Advanced

on:
  push:
    branches: [main, develop]
    paths:
      - 'srms/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'srms/**'
  # Allow manual trigger for nightly / on-demand runs
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - daily-manager
          - saas-founder
          - golden-path
          - service-request
          - takeout
          - split-bill-loyalty
      skip_deploy:
        description: 'Skip deployment'
        required: false
        default: false
        type: boolean

# Cancel in-progress runs on the same branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  WORKING_DIR: srms

defaults:
  run:
    working-directory: srms

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Lint + Type Check (fast feedback)
  # ─────────────────────────────────────────────
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx next lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Stage 2: Build (catches compile errors)
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npx next build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: srms/.next
          retention-days: 1

  # ─────────────────────────────────────────────
  # Stage 3a: E2E — Daily Manager Flow (Core)
  # ─────────────────────────────────────────────
  e2e-daily-manager:
    name: 📊 E2E — Daily Manager Flow
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_suite == 'all' ||
      github.event.inputs.test_suite == 'daily-manager'
    timeout-minutes: 25

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      TEST_MANAGER_EMAIL: manager@srms.app
      TEST_MANAGER_PASSWORD: Password123!
      TEST_WAITER_EMAIL: waiter@srms.app
      TEST_WAITER_PASSWORD: Password123!
      TEST_KITCHEN_EMAIL: kitchen@srms.app
      TEST_KITCHEN_PASSWORD: Password123!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: srms/.next

      - name: Start Next.js server
        run: npx next start --port 3000 &
        env:
          PORT: 3000

      - name: Wait for server health
        run: |
          echo "⏳ Waiting for server to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/login 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server is ready (attempt $i)"
              exit 0
            fi
            echo "  Attempt $i: HTTP $STATUS — retrying in 2s..."
            sleep 2
          done
          echo "❌ Server failed to start after 60s"
          exit 1

      - name: Run Daily Manager Flow (Advanced)
        run: |
          npx playwright test tests/daily-manager-flow-advanced.spec.ts \
            --project=chromium \
            --reporter=github,html \
            --timeout=120000
        env:
          BASE_URL: http://localhost:3000

      - name: Run Daily Manager Flow (Original)
        if: always()
        run: |
          npx playwright test tests/daily-manager-flow.spec.ts \
            --project=chromium \
            --reporter=github,html \
            --timeout=120000
        env:
          BASE_URL: http://localhost:3000

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-manager-screenshots
          path: srms/test-results/step*.png
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-manager-report
          path: srms/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-manager-test-results
          path: srms/test-results/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Stage 3b: E2E — All Other Flows (Parallel Shards)
  # ─────────────────────────────────────────────
  e2e-other-flows:
    name: 🧪 E2E — ${{ matrix.test_name }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          - test_file: tests/saas-founder-flow-advanced.spec.ts
            test_name: SaaS Founder Flow
            artifact_prefix: saas-founder
          - test_file: tests/golden-path.spec.ts
            test_name: Golden Path
            artifact_prefix: golden-path
          - test_file: tests/service-request-flow.spec.ts
            test_name: Service Requests
            artifact_prefix: service-request
          - test_file: tests/takeout-flow.spec.ts
            test_name: Takeout Flow
            artifact_prefix: takeout
          - test_file: tests/split-bill-loyalty-flow.spec.ts
            test_name: Split Bill & Loyalty
            artifact_prefix: split-bill

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      TEST_SUPER_ADMIN_EMAIL: demo@srms.app
      TEST_SUPER_ADMIN_PASSWORD: Password123!
      TEST_MANAGER_EMAIL: manager@srms.app
      TEST_MANAGER_PASSWORD: Password123!
      TEST_WAITER_EMAIL: waiter@srms.app
      TEST_WAITER_PASSWORD: Password123!
      TEST_KITCHEN_EMAIL: kitchen@srms.app
      TEST_KITCHEN_PASSWORD: Password123!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if suite should run
        id: should-run
        run: |
          SUITE="${{ github.event.inputs.test_suite }}"
          if [ "$SUITE" = "" ] || [ "$SUITE" = "all" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "$SUITE" = "${{ matrix.artifact_prefix }}" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.should-run.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install dependencies
        if: steps.should-run.outputs.run == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.should-run.outputs.run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Download build artifacts
        if: steps.should-run.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: srms/.next

      - name: Start Next.js server
        if: steps.should-run.outputs.run == 'true'
        run: npx next start --port 3000 &
        env:
          PORT: 3000

      - name: Wait for server health
        if: steps.should-run.outputs.run == 'true'
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/login 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Server timeout"
          exit 1

      - name: Run E2E tests — ${{ matrix.test_name }}
        if: steps.should-run.outputs.run == 'true'
        run: |
          npx playwright test ${{ matrix.test_file }} \
            --project=chromium \
            --reporter=github,html \
            --timeout=120000
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always() && steps.should-run.outputs.run == 'true'
        with:
          name: ${{ matrix.artifact_prefix }}-report
          path: srms/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() && steps.should-run.outputs.run == 'true'
        with:
          name: ${{ matrix.artifact_prefix }}-test-results
          path: srms/test-results/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Stage 4: Test Results Summary
  # ─────────────────────────────────────────────
  test-summary:
    name: 📋 Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-daily-manager, e2e-other-flows]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Evaluate test results
        run: |
          echo "╔═══════════════════════════════════════╗"
          echo "║       SRMS E2E Test Summary           ║"
          echo "╠═══════════════════════════════════════╣"
          echo "║ Daily Manager: ${{ needs.e2e-daily-manager.result }}"
          echo "║ Other Flows:   ${{ needs.e2e-other-flows.result }}"
          echo "╚═══════════════════════════════════════╝"

          if [ "${{ needs.e2e-daily-manager.result }}" = "failure" ]; then
            echo "::error::Daily Manager Flow tests failed"
          fi
          if [ "${{ needs.e2e-other-flows.result }}" = "failure" ]; then
            echo "::warning::Some E2E flow tests failed (check individual results)"
          fi
        working-directory: .

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const managerResult = '${{ needs.e2e-daily-manager.result }}';
            const otherResult = '${{ needs.e2e-other-flows.result }}';

            const icon = (r) => r === 'success' ? '✅' : r === 'failure' ? '❌' : r === 'skipped' ? '⏭️' : '⚠️';

            const body = [
              '## 🧪 E2E Test Results',
              '',
              '| Flow | Status |',
              '|------|--------|',
              `| 📊 Daily Manager Flow | ${icon(managerResult)} ${managerResult} |`,
              `| 🧪 Other E2E Flows | ${icon(otherResult)} ${otherResult} |`,
              '',
              `> Commit: \`${context.sha.substring(0, 7)}\` | Actor: @${context.actor}`,
              '',
              '📎 Download detailed reports from the **Artifacts** section below.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ─────────────────────────────────────────────
  # Stage 5: Deploy Preview (PRs)
  # ─────────────────────────────────────────────
  deploy-preview:
    name: 🚀 Deploy Preview
    runs-on: ubuntu-latest
    needs: [build, e2e-daily-manager]
    if: >-
      github.event_name == 'pull_request' &&
      (github.event.inputs.skip_deploy != 'true')
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Preview)
        if: env.VERCEL_TOKEN != ''
        run: |
          vercel deploy --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --confirm \
            2>&1 | tee deploy-output.txt

          PREVIEW_URL=$(grep -oP 'https://[^ ]+\.vercel\.app' deploy-output.txt | head -1)
          echo "PREVIEW_URL=$PREVIEW_URL" >> $GITHUB_ENV
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Comment preview URL on PR
        if: env.PREVIEW_URL != ''
        uses: actions/github-script@v7
        with:
          script: |
            const managerResult = '${{ needs.e2e-daily-manager.result }}';
            const icon = managerResult === 'success' ? '✅' : '⚠️';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed**: ${process.env.PREVIEW_URL}\n\n${icon} Daily Manager Flow: ${managerResult} | 🧪 Tests completed`
            })

  # ─────────────────────────────────────────────
  # Stage 6: Deploy Production (main branch)
  # ─────────────────────────────────────────────
  deploy-production:
    name: 🌍 Deploy Production
    runs-on: ubuntu-latest
    needs: [build, e2e-daily-manager, e2e-other-flows]
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.e2e-daily-manager.result == 'success'
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        if: env.VERCEL_TOKEN != ''
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --confirm
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Production deploy summary
        run: |
          echo "╔═══════════════════════════════════════╗"
          echo "║  ✅ Production deployment complete     ║"
          echo "╠═══════════════════════════════════════╣"
          echo "║  📊 Commit: ${{ github.sha }}         "
          echo "║  👤 Author: ${{ github.actor }}       "
          echo "║  📊 Manager Flow: ${{ needs.e2e-daily-manager.result }}"
          echo "║  🧪 Other Flows:  ${{ needs.e2e-other-flows.result }}"
          echo "╚═══════════════════════════════════════╝"

  # ─────────────────────────────────────────────
  # Nightly: Scheduled full regression
  # ─────────────────────────────────────────────
  notify-failure:
    name: 🔔 Failure Notification
    runs-on: ubuntu-latest
    needs: [e2e-daily-manager, e2e-other-flows]
    if: >-
      always() &&
      (needs.e2e-daily-manager.result == 'failure' || needs.e2e-other-flows.result == 'failure')
    timeout-minutes: 5

    steps:
      - name: Post failure summary
        run: |
          echo "::error::E2E tests failed!"
          echo ""
          echo "Daily Manager Flow: ${{ needs.e2e-daily-manager.result }}"
          echo "Other E2E Flows:    ${{ needs.e2e-other-flows.result }}"
          echo ""
          echo "View artifacts for detailed Playwright reports."
        working-directory: .

      - name: Notify via Slack (optional)
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "🚨 SRMS E2E Tests Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🚨 SRMS E2E Test Failure" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Daily Manager:*\n${{ needs.e2e-daily-manager.result }}" },
                    { "type": "mrkdwn", "text": "*Other Flows:*\n${{ needs.e2e-other-flows.result }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }'
        working-directory: .
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
