name: SRMS Nightly Regression — Full Suite

on:
  schedule:
    # Run every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      retries:
        description: 'Number of retries on failure'
        required: false
        default: '3'
        type: string

concurrency:
  group: nightly-regression
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

defaults:
  run:
    working-directory: srms

jobs:
  nightly-manager-flow:
    name: 📊 Nightly — Daily Manager Flow
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      TEST_SUPER_ADMIN_EMAIL: demo@srms.app
      TEST_SUPER_ADMIN_PASSWORD: Password123!
      TEST_MANAGER_EMAIL: manager@srms.app
      TEST_MANAGER_PASSWORD: Password123!
      TEST_WAITER_EMAIL: waiter@srms.app
      TEST_WAITER_PASSWORD: Password123!
      TEST_KITCHEN_EMAIL: kitchen@srms.app
      TEST_KITCHEN_PASSWORD: Password123!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: srms/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npx next build
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start server and run Daily Manager tests
        run: |
          # Start server in background
          npx next start --port 3000 &
          SERVER_PID=$!

          # Wait for server
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "" http://localhost:3000/login 2>/dev/null; then
              echo "✅ Server ready"
              break
            fi
            sleep 2
          done

          # Run tests with retries
          RETRIES=${{ github.event.inputs.retries || '3' }}
          npx playwright test tests/daily-manager-flow-advanced.spec.ts \
            --project=chromium \
            --reporter=github,html \
            --retries=$RETRIES \
            --timeout=120000

          # Run SaaS Founder Flow
          npx playwright test tests/saas-founder-flow-advanced.spec.ts \
            --project=chromium \
            --reporter=github,html \
            --retries=$RETRIES \
            --timeout=120000

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true
        env:
          BASE_URL: http://localhost:3000

      - name: Run cross-browser verification
        if: success()
        run: |
          npx playwright install --with-deps
          npx next start --port 3001 &
          sleep 10

          # Run on Mobile Chrome (viewport regression)
          npx playwright test tests/daily-manager-flow-advanced.spec.ts \
            --project="Mobile Chrome" \
            --reporter=html \
            --retries=2 \
            --timeout=120000 || true

          kill %1 2>/dev/null || true
        env:
          BASE_URL: http://localhost:3001

      - name: Upload nightly report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-manager-flow-${{ github.run_number }}
          path: |
            srms/playwright-report/
            srms/test-results/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Create an issue for nightly failure tracking
            const title = `🚨 Nightly Regression Failure — Daily Manager Flow (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              '## Nightly Regression Failed',
              '',
              `**Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Date:** ${new Date().toISOString()}`,
              `**Commit:** \`${context.sha.substring(0, 7)}\``,
              '',
              '### Failed Flow',
              '- 📊 Daily Manager Flow (Back-of-House Admin)',
              '',
              '### Steps to Reproduce',
              '1. Check the Playwright report artifact for screenshots',
              '2. Run locally: `npx playwright test tests/daily-manager-flow-advanced.spec.ts --project=chromium`',
              '',
              '### Artifacts',
              'Download the `nightly-manager-flow-*` artifact for detailed traces and screenshots.',
              '',
              '---',
              '*This issue was automatically created by the nightly regression workflow.*',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-failure',
              state: 'open',
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['nightly-failure', 'bug', 'e2e'],
              });
            } else {
              // Comment on existing open issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `### Another nightly failure (${new Date().toISOString().slice(0, 10)})\n\n[Run #${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
            }
